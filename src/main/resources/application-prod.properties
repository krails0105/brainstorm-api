# Railway DB 연결 (앱 서비스에서 Postgres Reference Variable로 주입)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.h2.console.enabled=false

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# HikariCP connection pool (Railway DB proxy)
# Railway closes idle connections early, so set shorter maxLifetime (10min)
spring.datasource.hikari.max-lifetime=600000
# Connection acquire timeout (20s)
spring.datasource.hikari.connection-timeout=20000
# Ping idle connections every 5min to prevent disconnection
spring.datasource.hikari.keepalive-time=300000
# Minimum idle connections
spring.datasource.hikari.minimum-idle=2
# Max pool size (considering Railway free plan limits)
spring.datasource.hikari.maximum-pool-size=5

jwt.secret=${JWT_SECRET}
app.frontend-url=${FRONTEND_URL}
