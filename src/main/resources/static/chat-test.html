<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        #chat-box { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin: 10px 0; }
        .msg { margin: 5px 0; }
        .nickname { font-weight: bold; color: #2563eb; }
        .time { color: #999; font-size: 12px; }
        input, button { padding: 8px; margin: 4px; }
        #message { width: 300px; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 14px; }
        .connected { background: #d1fae5; color: #065f46; }
        .disconnected { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <h2>채팅 테스트</h2>

    <!-- 연결 설정 -->
    <div>
        <label>Room ID: <input type="number" id="roomId" value="1"></label>
        <label>User ID (UUID): <input type="text" id="userId" size="36"></label>
        <br>
        <button onclick="connect()">연결</button>
        <button onclick="disconnect()">연결 해제</button>
        <span id="status" class="status disconnected">연결 안됨</span>
    </div>

    <!-- 채팅 영역 -->
    <div id="chat-box"></div>

    <!-- 메시지 전송 -->
    <div>
        <input type="text" id="message" placeholder="메시지 입력..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">전송</button>
        <button onclick="loadHistory()">히스토리 조회</button>
    </div>

    <script>
        let stompClient = null;

        // WebSocket 연결
        function connect() {
            const roomId = document.getElementById('roomId').value;
            // SockJS로 /ws 엔드포인트에 연결
            const socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function () {
                setStatus(true);
                // 룸 채널 구독 — 메시지가 오면 화면에 표시
                stompClient.subscribe('/topic/rooms/' + roomId, function (msg) {
                    const data = JSON.parse(msg.body);
                    appendMessage(data.nickname, data.content, data.createdAt);
                });
            }, function (error) {
                console.error('연결 실패:', error);
                setStatus(false);
            });
        }

        // 연결 해제
        function disconnect() {
            if (stompClient) stompClient.disconnect();
            setStatus(false);
        }

        // 메시지 전송
        function send() {
            const roomId = document.getElementById('roomId').value;
            const userId = document.getElementById('userId').value;
            const content = document.getElementById('message').value;
            if (!content) return;

            // /app/rooms/{roomId}/chat 으로 메시지 발행
            stompClient.send('/app/rooms/' + roomId + '/chat', {}, JSON.stringify({
                userId: userId,
                content: content
            }));
            document.getElementById('message').value = '';
        }

        // REST API로 히스토리 조회
        function loadHistory() {
            const roomId = document.getElementById('roomId').value;
            const token = prompt('JWT 토큰을 입력하세요:');
            if (!token) return;

            fetch('http://localhost:8080/api/rooms/' + roomId + '/chat', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(data => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = '<div style="color:#999">--- 히스토리 ---</div>';
                data.data.forEach(msg => appendMessage(msg.nickname, msg.content, msg.createdAt));
            })
            .catch(err => console.error('조회 실패:', err));
        }

        // 화면에 메시지 추가
        function appendMessage(nickname, content, createdAt) {
            const chatBox = document.getElementById('chat-box');
            const time = createdAt ? new Date(createdAt).toLocaleTimeString() : '';
            chatBox.innerHTML += `<div class="msg"><span class="nickname">${nickname}</span>: ${content} <span class="time">${time}</span></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 연결 상태 표시
        function setStatus(connected) {
            const el = document.getElementById('status');
            el.textContent = connected ? '연결됨' : '연결 안됨';
            el.className = 'status ' + (connected ? 'connected' : 'disconnected');
        }
    </script>
</body>
</html>
